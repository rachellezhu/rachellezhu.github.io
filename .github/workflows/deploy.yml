name: Deploy to Github Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1.3.10

      - name: Install deps
        run: bun run build

      - name: Deploy
        uses: actions/upload-pages-artifact@v2
        with:
          path: ./dist
    
    deploy:
      needs: build
      runs-on: ubuntu-latest
      permissions:
        pages: write
        id-token: write
      
      steps:
        - name: Deploy to GitHub Pages
          uses: action/deploy-pages@v2